<html lang="en">
<head>
    <meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="a2Ewy8nrxyuHxaR-Y5jU-2whV7CQqB2CCm2HVCzfxYw" />

<meta name="robots" content="index, follow">
    <title>Bootstrap · slowed + reverb</title>
    <!-- Bootstrap 5 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(145deg, #130b22, #251d38);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem;
        }
        .bootstrap-card {
            background: rgba(25, 15, 40, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(170, 130, 240, 0.3);
            border-radius: 2.8rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.7);
            max-width: 1100px;
            width: 100%;
            padding: 2rem 1.8rem;
        }
        /* slider styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #4d3277, #906ad6);
            border-radius: 30px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 4px 10px #b280ff, 0 0 0 3px #614392;
            border: 2px solid #eee4ff;
            cursor: pointer;
        }
        .effect-value {
            background: #2f1e47;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            color: white;
            border: 1px solid #8d6bcb;
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
        }
        /* footer links styling */
        .footer-links a {
            color: #c7b3ff;
            text-decoration: none;
            transition: 0.2s;
            margin: 0 0.5rem;
        }
        .footer-links a:hover {
            color: white;
            text-decoration: underline;
        }
        @media (max-width: 480px) {
            .bootstrap-card { padding: 1.5rem 1rem; }
        }
    </style>
</head>
<body>
    <div class="bootstrap-card">
        <!-- header -->
        <div class="text-center mb-4">
            <h1 class="display-5 fw-bold text-white" style="text-shadow:0 0 10px #b28eff;"><i class="bi bi-vinyl-fill me-2" style="color:#c5a7ff;"></i>slowed + reverb</h1>
            <p class="text-white-50 fs-6">mobile 1 · tablet 2 · desktop 4</p>
        </div>

        <!-- hidden file input -->
        <input type="file" id="audioUpload" accept="audio/*,.mp3,.wav,.ogg,.m4a" class="d-none">

        <!-- FILE ROW – responsive flex wrap -->
        <div class="d-flex flex-wrap align-items-center gap-3 bg-dark bg-opacity-40 rounded-5 p-3 mb-4 border border-secondary" style="background:rgba(0,0,0,0.3); backdrop-filter:blur(4px);" id="dropZone">
            <button class="btn btn-outline-light btn-lg rounded-pill px-4 d-inline-flex align-items-center gap-2" style="background:#352a4a; border-color:#aa8bea;" id="uploadBtn">
                <i class="bi bi-music-note-beamed"></i> load track
            </button>
            <span class="text-info fw-semibold fs-6" id="fileInfo">no file selected</span>
        </div>

        <!-- player strip (play/stop) no timer -->
        <div class="d-flex flex-wrap align-items-center gap-4 bg-dark bg-opacity-30 rounded-5 p-3 mb-5 border border-secondary">
            <div class="d-flex gap-3">
                <button class="btn btn-lg rounded-circle d-flex align-items-center justify-content-center" style="width:60px; height:60px; background:#463467; border:1px solid #b292f0; color:white; box-shadow:0 5px 0 #251e33;" id="playBtn" disabled>
                    <i class="bi bi-play-fill fs-1"></i>
                </button>
                <button class="btn btn-lg rounded-circle d-flex align-items-center justify-content-center" style="width:60px; height:60px; background:#352b47; border:1px solid #9f82da; color:white; box-shadow:0 5px 0 #1d152b;" id="stopBtn" disabled>
                    <i class="bi bi-stop-fill fs-1"></i>
                </button>
            </div>
        </div>

        <!-- EFFECT GRID – responsive as requested: col-12 (mobile 1) · col-sm-6 (tablet 2) · col-md-3 (desktop 4) -->
        <div class="row g-3 mb-5">
            <!-- speed -->
            <div class="col-12 col-sm-6 col-md-3">
                <div class="bg-dark bg-opacity-40 rounded-4 p-3 border border-secondary" style="background:rgba(0,0,0,0.3);">
                    <div class="d-flex justify-content-between align-items-baseline mb-3">
                        <span class="text-white-50 text-uppercase small fw-semibold"><i class="bi bi-speedometer2 me-1"></i>speed</span>
                        <span class="effect-value" id="speedVal">1.00x</span>
                    </div>
                    <input type="range" id="speed" min="0.4" max="1.6" value="1.0" step="0.01" class="w-100">
                </div>
            </div>
            <!-- reverb -->
            <div class="col-12 col-sm-6 col-md-3">
                <div class="bg-dark bg-opacity-40 rounded-4 p-3 border border-secondary">
                    <div class="d-flex justify-content-between align-items-baseline mb-3">
                        <span class="text-white-50 text-uppercase small fw-semibold"><i class="bi bi-soundwave me-1"></i>reverb</span>
                        <span class="effect-value" id="reverbVal">50%</span>
                    </div>
                    <input type="range" id="reverb" min="0" max="100" value="50" step="1" class="w-100">
                </div>
            </div>
            <!-- bass -->
            <div class="col-12 col-sm-6 col-md-3">
                <div class="bg-dark bg-opacity-40 rounded-4 p-3 border border-secondary">
                    <div class="d-flex justify-content-between align-items-baseline mb-3">
                        <span class="text-white-50 text-uppercase small fw-semibold"><i class="bi bi-boombox me-1"></i>bass</span>
                        <span class="effect-value" id="bassVal">10 dB</span>
                    </div>
                    <input type="range" id="bass" min="0" max="20" value="10" step="0.5" class="w-100">
                </div>
            </div>
            <!-- volume -->
            <div class="col-12 col-sm-6 col-md-3">
                <div class="bg-dark bg-opacity-40 rounded-4 p-3 border border-secondary">
                    <div class="d-flex justify-content-between align-items-baseline mb-3">
                        <span class="text-white-50 text-uppercase small fw-semibold"><i class="bi bi-volume-up me-1"></i>volume</span>
                        <span class="effect-value" id="volumeVal">1.00x</span>
                    </div>
                    <input type="range" id="volume" min="0" max="2" value="1.0" step="0.01" class="w-100">
                </div>
            </div>
        </div>

        <!-- action row -->
        <div class="d-flex flex-wrap gap-3 justify-content-center">
            <button class="btn btn-lg rounded-pill px-5 py-3 d-inline-flex align-items-center gap-2" style="background:#6d4ac7; border-color:#b28eff; color:white; box-shadow:0 6px 0 #412d79;" id="exportBtn" disabled>
                <i class="bi bi-file-earmark-arrow-down"></i> EXPORT WAV
            </button>
            <button class="btn btn-lg rounded-pill px-5 py-3 d-inline-flex align-items-center gap-2" style="background:#352d47; border-color:#9d83d9; color:white; box-shadow:0 6px 0 #201b30;" id="resetBtn">
                <i class="bi bi-arrow-repeat"></i> reset
            </button>
        </div>

        <!-- FOOTER with Privacy, About, Contact (email added) and original line -->
        <footer class="text-center text-white-50 small mt-5 pt-3 border-top border-secondary">
            <div class="footer-links d-flex flex-wrap justify-content-center gap-3 mb-2">
                <a href="#" id="privacyLink"><i class="bi bi-shield-lock me-1"></i>Privacy Policy</a>
                <a href="#" id="aboutLink"><i class="bi bi-info-circle me-1"></i>About Us</a>
                <a href="#" id="contactLink"><i class="bi bi-envelope me-1"></i>Contact</a>
                <span class="text-white-50">📧 uraut4236@gmail.com</span>
            </div>
            <div>1 · 2 · 4 columns · no timer</div>
        </footer>
    </div>

    <!-- Modal container for privacy/about/contact (simple inline modals) -->
    <div class="modal fade" id="infoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border border-secondary" style="background:#1f172e!important;">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="modalTitle"><i class="bi bi-file-text me-2"></i>Info</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- content inserted via js -->
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function() {
            // ---------- AUDIO ENGINE (identical to original, just with updated labels) ----------
            const fileInput = document.getElementById('audioUpload');
            const uploadBtn = document.getElementById('uploadBtn');
            const fileInfo = document.getElementById('fileInfo');
            const playBtn = document.getElementById('playBtn');
            const stopBtn = document.getElementById('stopBtn');
            const exportBtn = document.getElementById('exportBtn');
            const resetBtn = document.getElementById('resetBtn');
            const dropZone = document.getElementById('dropZone');

            const speed = document.getElementById('speed');
            const speedVal = document.getElementById('speedVal');
            const reverb = document.getElementById('reverb');
            const reverbVal = document.getElementById('reverbVal');
            const bass = document.getElementById('bass');
            const bassVal = document.getElementById('bassVal');
            const volume = document.getElementById('volume');
            const volumeVal = document.getElementById('volumeVal');

            let audioContext = null;
            let sourceNode = null;
            let rawBuffer = null;
            let isPlaying = false;
            let pauseOffset = 0;
            let startTime = 0;
            let bassFilter = null, convolver = null, dryGain = null, wetGain = null, masterGain = null;

            function updateLabels() {
                speedVal.innerText = parseFloat(speed.value).toFixed(2) + 'x';
                reverbVal.innerText = Math.round(reverb.value) + '%';
                bassVal.innerText = parseFloat(bass.value).toFixed(1) + ' dB';
                volumeVal.innerText = parseFloat(volume.value).toFixed(2) + 'x';
            }
            speed.addEventListener('input', updateLabels);
            reverb.addEventListener('input', updateLabels);
            bass.addEventListener('input', updateLabels);
            volume.addEventListener('input', updateLabels);
            updateLabels();

            resetBtn.addEventListener('click', () => {
                speed.value = '1.0';
                reverb.value = '50';
                bass.value = '10';
                volume.value = '1.0';
                updateLabels();
                updateLiveParams();
            });

            function updateLiveParams() {
                if (!audioContext) return;
                const s = parseFloat(speed.value);
                const r = parseFloat(reverb.value) / 100;
                const b = parseFloat(bass.value);
                const v = parseFloat(volume.value);

                if (sourceNode && sourceNode.playbackRate)
                    sourceNode.playbackRate.setValueAtTime(s, audioContext.currentTime);
                if (bassFilter) bassFilter.gain.setValueAtTime(b, audioContext.currentTime);
                if (dryGain && wetGain) {
                    dryGain.gain.setValueAtTime(1 - r, audioContext.currentTime);
                    wetGain.gain.setValueAtTime(r, audioContext.currentTime);
                }
                if (masterGain) masterGain.gain.setValueAtTime(v, audioContext.currentTime);
            }
            speed.addEventListener('input', updateLiveParams);
            reverb.addEventListener('input', updateLiveParams);
            bass.addEventListener('input', updateLiveParams);
            volume.addEventListener('input', updateLiveParams);

            function createImpulse(dur, decay, sr) {
                const len = sr * dur;
                const L = new Float32Array(len);
                const R = new Float32Array(len);
                for (let i = 0; i < len; i++) {
                    const n = Math.random() * 2 - 1;
                    const env = Math.pow(1 - i / len, decay);
                    L[i] = n * env;
                    R[i] = n * env;
                }
                const buf = new AudioBuffer({ numberOfChannels: 2, length: len, sampleRate: sr });
                buf.copyToChannel(L, 0);
                buf.copyToChannel(R, 1);
                return buf;
            }

            function buildGraph() {
                if (!audioContext) return;
                if (bassFilter) bassFilter.disconnect();
                if (convolver) convolver.disconnect();
                if (dryGain) dryGain.disconnect();
                if (wetGain) wetGain.disconnect();
                if (masterGain) masterGain.disconnect();

                bassFilter = audioContext.createBiquadFilter();
                bassFilter.type = 'lowshelf';
                bassFilter.frequency.value = 100;
                bassFilter.gain.value = parseFloat(bass.value);

                convolver = audioContext.createConvolver();
                convolver.buffer = createImpulse(2.4, 3.2, audioContext.sampleRate);

                dryGain = audioContext.createGain();
                wetGain = audioContext.createGain();
                const r = parseFloat(reverb.value) / 100;
                dryGain.gain.value = 1 - r;
                wetGain.gain.value = r;

                masterGain = audioContext.createGain();
                masterGain.gain.value = parseFloat(volume.value);

                bassFilter.connect(dryGain);
                bassFilter.connect(convolver);
                convolver.connect(wetGain);
                dryGain.connect(masterGain);
                wetGain.connect(masterGain);
                masterGain.connect(audioContext.destination);
            }

            function stopPlayback() {
                if (sourceNode) {
                    try { sourceNode.stop(); } catch (e) {}
                    sourceNode.disconnect();
                    sourceNode = null;
                }
                isPlaying = false;
                playBtn.innerHTML = '<i class="bi bi-play-fill fs-1"></i>';
                pauseOffset = 0;
                startTime = 0;
            }

            function pausePlayback() {
                if (!isPlaying || !sourceNode || !audioContext) return;
                const pos = audioContext.currentTime - startTime;
                pauseOffset = Math.min(pos, rawBuffer.duration - 0.01);
                try { sourceNode.stop(); } catch (e) {}
                sourceNode.disconnect();
                sourceNode = null;
                isPlaying = false;
                playBtn.innerHTML = '<i class="bi bi-play-fill fs-1"></i>';
            }

            function startPlayback() {
                if (!rawBuffer) return;
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') audioContext.resume();

                buildGraph();

                sourceNode = audioContext.createBufferSource();
                sourceNode.buffer = rawBuffer;
                sourceNode.playbackRate.value = parseFloat(speed.value);
                sourceNode.connect(bassFilter);

                const offset = pauseOffset;
                const dur = rawBuffer.duration - offset;
                sourceNode.start(0, offset, dur);
                startTime = audioContext.currentTime - offset;
                isPlaying = true;
                playBtn.innerHTML = '<i class="bi bi-pause-fill fs-1"></i>';
            }

            playBtn.addEventListener('click', () => {
                if (!rawBuffer) return alert('load a track');
                if (isPlaying) pausePlayback();
                else startPlayback();
            });

            stopBtn.addEventListener('click', stopPlayback);

            function handleFile(file) {
                if (!file) return;
                if (file.size > 150e6) { alert('max 150MB'); return; }
                stopPlayback();
                pauseOffset = 0;
                fileInfo.innerText = `📁 ${file.name.slice(0, 22)}… (${(file.size/1e6).toFixed(1)}MB)`;

                const reader = new FileReader();
                reader.onload = (e) => {
                    const ctx = new OfflineAudioContext(2, 2, 44100);
                    ctx.decodeAudioData(e.target.result, (buf) => {
                        rawBuffer = buf;
                        fileInfo.innerText = `📁 ${file.name.slice(0, 20)}… ✅ ready`;
                        playBtn.disabled = false;
                        stopBtn.disabled = false;
                        exportBtn.disabled = false;
                    }, () => {
                        fileInfo.innerText = '⚠️ unsupported';
                        playBtn.disabled = true;
                        stopBtn.disabled = true;
                        exportBtn.disabled = true;
                        rawBuffer = null;
                    });
                };
                reader.readAsArrayBuffer(file);
            }

            uploadBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length) handleFile(e.target.files[0]);
            });

            dropZone.addEventListener('dragover', (e) => e.preventDefault());
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
            });

            function impulseOffline(dur, decay, sr) {
                const len = sr * dur;
                const arr = new Float32Array(len);
                for (let i = 0; i < len; i++) arr[i] = (Math.random()*2-1) * Math.pow(1-i/len, decay);
                return arr;
            }

            exportBtn.addEventListener('click', async () => {
                if (!rawBuffer) return alert('load audio');
                if (window.rendering) return;
                window.rendering = true;
                exportBtn.disabled = true;
                const originalText = exportBtn.innerHTML;
                exportBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> rendering...';

                try {
                    const sp = parseFloat(speed.value);
                    const rAmt = parseFloat(reverb.value) / 100;
                    const bDB = parseFloat(bass.value);
                    const vol = parseFloat(volume.value);

                    const totalSamples = Math.floor(rawBuffer.length / sp);
                    const offCtx = new OfflineAudioContext(rawBuffer.numberOfChannels, totalSamples, rawBuffer.sampleRate);

                    const src = offCtx.createBufferSource();
                    src.buffer = rawBuffer;
                    src.playbackRate.value = sp;

                    const bassF = offCtx.createBiquadFilter();
                    bassF.type = 'lowshelf'; bassF.frequency.value = 100; bassF.gain.value = bDB;

                    const conv = offCtx.createConvolver();
                    const impLen = 2.5;
                    const impBuf = offCtx.createBuffer(2, offCtx.sampleRate * impLen, offCtx.sampleRate);
                    for (let ch = 0; ch < 2; ch++) impBuf.copyToChannel(impulseOffline(impLen, 3.0, offCtx.sampleRate), ch);
                    conv.buffer = impBuf;

                    const dry = offCtx.createGain(); dry.gain.value = 1 - rAmt;
                    const wet = offCtx.createGain(); wet.gain.value = rAmt;
                    const master = offCtx.createGain(); master.gain.value = vol;

                    src.connect(bassF);
                    bassF.connect(dry); bassF.connect(conv);
                    conv.connect(wet);
                    dry.connect(master); wet.connect(master);
                    master.connect(offCtx.destination);

                    src.start(0);
                    const rendered = await offCtx.startRendering();

                    const writeString = (view, off, str) => {
                        for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i));
                    };
                    const bufferToWave = (abuffer, len) => {
                        const ch = abuffer.numberOfChannels, sr = abuffer.sampleRate, bps = 16;
                        const block = ch * bps/8, dataSize = len * block;
                        const buf = new ArrayBuffer(44 + dataSize);
                        const dv = new DataView(buf);
                        writeString(dv, 0, 'RIFF'); dv.setUint32(4, 36+dataSize, true);
                        writeString(dv, 8, 'WAVE'); writeString(dv, 12, 'fmt ');
                        dv.setUint32(16, 16, true); dv.setUint16(20, 1, true);
                        dv.setUint16(22, ch, true); dv.setUint32(24, sr, true);
                        dv.setUint32(28, sr * block, true); dv.setUint16(32, block, true);
                        dv.setUint16(34, bps, true); writeString(dv, 36, 'data');
                        dv.setUint32(40, dataSize, true);

                        const chan = [];
                        for (let i = 0; i < ch; i++) chan.push(abuffer.getChannelData(i));
                        let off = 44;
                        for (let i = 0; i < len; i++) {
                            for (let c = 0; c < ch; c++) {
                                let s = Math.max(-1, Math.min(1, chan[c][i]));
                                s = s < 0 ? s * 0x8000 : s * 0x7FFF;
                                dv.setInt16(off, s, true);
                                off += 2;
                            }
                        }
                        return new Blob([buf], {type: 'audio/wav'});
                    };

                    const blob = bufferToWave(rendered, rendered.length);
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `slowed_${sp.toFixed(2)}x_${Math.round(rAmt*100)}%.wav`;
                    a.click();
                    URL.revokeObjectURL(url);
                } catch (e) {
                    console.error(e);
                    alert('export error');
                } finally {
                    window.rendering = false;
                    exportBtn.disabled = false;
                    exportBtn.innerHTML = originalText;
                }
            });

            // ---------- PRIVACY / ABOUT / CONTACT MODALS (Bootstrap) ----------
            const modalEl = document.getElementById('infoModal');
            let bsModal = null;
            if (modalEl) {
                bsModal = new bootstrap.Modal(modalEl);
            }

            function showModal(title, content) {
                document.getElementById('modalTitle').innerHTML = `<i class="bi bi-file-text me-2"></i>${title}`;
                document.getElementById('modalBody').innerHTML = content;
                if (bsModal) bsModal.show();
            }

            document.getElementById('privacyLink').addEventListener('click', (e) => {
                e.preventDefault();
                showModal('Privacy Policy', `
                    <p><strong>Last updated: 2025</strong></p>
                    <p>Your privacy is important. This tool processes all audio locally in your browser. No files are uploaded to any server. We do not collect, store, or share any personal data. The email (uraut4236@gmail.com) is only for contact purposes.</p>
                    <p>Any future updates will be reflected here. By using this tool you agree that no data leaves your device.</p>
                `);
            });

            document.getElementById('aboutLink').addEventListener('click', (e) => {
                e.preventDefault();
                showModal('About Us', `
                    <p><i class="bi bi-vinyl-fill me-1" style="color:#b28eff;"></i> <strong>slowed + reverb</strong> — a passion project for lo-fi enthusiasts.</p>
                    <p>Built with Bootstrap 5 and Web Audio API. Created to easily apply speed, reverb, bass, and volume effects in real time. Export your creation as high-quality WAV.</p>
                    <p>Developer: uraut4236@gmail.com</p>
                    <p>Version 2.0 · open feedback always welcome.</p>
                `);
            });

            document.getElementById('contactLink').addEventListener('click', (e) => {
                e.preventDefault();
                showModal('Contact Us', `
                    <p><i class="bi bi-envelope-fill me-2"></i>Got questions, suggestions, or just want to share your slowed track?</p>
                    <p>Email us directly: <a href="mailto:uraut4236@gmail.com" class="text-info">uraut4236@gmail.com</a></p>
                    <p>We try to respond within 1–2 days. For bug reports, please include details about your browser and device.</p>
                `);
            });

            // ensure email is visible also as clickable (already in footer)
        })();
    </script>
</body>
